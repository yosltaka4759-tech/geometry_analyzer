
geometry_analyzer:
  _target_: plugins.geometry_analyzer.GeometryAnalyzer
  pixel_size_nm: 0.045       # Will be overriddent by frame metadata. 
  workers: 1              

  # output 
  save_dir: outputs/geometry_viz

  # switches
  draw_pca_major: true       
  green_show_area: true        
  save_image: true       
  save_csv: false           

  geom_push_image: true        
  geom_push_stats: true       



